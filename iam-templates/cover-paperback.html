<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ketabi · I Am [Child] · wraparound cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Baloo+Bhaijaan+2:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<!--
  ============================================================================
  KETABI — "I Am [Child]"  ·  WRAPAROUND COVER (back + spine + front), one piece
  ============================================================================
  Lulu cover is a SINGLE file = back cover (left) + spine (centre) + front (right).

  Square 8.5 x 8.5 in book, 32 pages:
    Height (with bleed) .. 8.75 in
    Front / back panels .. 8.5 in each (trim) ; full-bleed art runs to 8.75 in tall
    Bleed ................ 0.125 in on top, bottom, and the two OUTER edges
    Spine width .......... SET BY LULU from final page count + paper/binding.
                           Placeholder here = {{SPINE_IN}} in (token). Get the exact
                           value from Lulu's cover template for your binding, then
                           replace --spine below. Keep spine text clear of the
                           fold by ~0.0625 in each side.
    Safe margin .......... keep text 0.5 in inside each panel's trim.
    300 PPI, sRGB, fonts embedded.

  Tokens: {{CHILD_NAME}}, {{CHILD_NAME_ARABIC}}, {{PHOTO_COVER}}, {{SPINE_IN}}
  This preview scales 1 in = 80 px. For the real file, render each panel at 300 PPI.
  ============================================================================
-->
<style>
  :root{
    --in:80px;                 /* preview scale: 1 inch = 80px */
    --bleed:calc(0.125 * var(--in));
    --panel:calc(8.5 * var(--in));
    --tall:calc(8.75 * var(--in));
    --spine:calc(0.25 * var(--in));   /* {{SPINE_IN}} — replace with Lulu's value */
    --cream:#f6efdd; --teal:#2f5d57; --teal-dk:#21443f; --gold:#e6b94e; --terra:#cd7e58;
  }
  *{box-sizing:border-box}
  body{margin:0;background:#e7e2d8;font-family:'Plus Jakarta Sans',sans-serif;
       min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
  .cap{font:700 11px 'Plus Jakarta Sans';letter-spacing:.18em;text-transform:uppercase;color:#9a7b52;margin-bottom:14px;text-align:center}
  .wrap{display:flex;height:var(--tall);box-shadow:0 30px 70px rgba(60,40,20,.30);background:var(--teal)}

  .panel{height:100%;position:relative;overflow:hidden;container-type:inline-size}
  .back{width:calc(var(--panel) + var(--bleed))}
  .front{width:calc(var(--panel) + var(--bleed))}
  .spine{width:var(--spine);background:var(--teal-dk);position:relative;display:flex;align-items:center;justify-content:center}

  /* fold guide lines (screen only) */
  .fold{position:absolute;top:0;bottom:0;width:0;border-left:1px dashed rgba(255,255,255,.28);z-index:5;pointer-events:none}

  /* FRONT — editorial cover: photo on top (4:3) + cream title plate below.
     .front clips the face + the 1/8in bleed; .coverface is the exact visible
     face; the photo fills .photo-area (matches the 4:3 crop) and bleeds past it;
     the plate covers the bottom and bleeds too. */
  .coverface{position:absolute;left:0;top:var(--bleed);width:var(--panel);height:var(--panel);
             overflow:visible;container-type:inline-size}
  .photo-area{position:absolute;left:0;right:0;top:0;height:75%;overflow:visible}
  /* with a crop, {{PHOTO_COVER_STYLE}} maps the 4:3 crop onto .photo-area + bleeds */
  .coverphoto{position:absolute;left:0;top:calc(-1 * var(--bleed));
              width:calc(100% + var(--bleed));height:calc(100% + var(--bleed));
              object-fit:cover;background:var(--teal-dk)}
  .plate{position:absolute;left:0;right:0;top:75%;bottom:calc(-1 * var(--bleed));z-index:2;
         background:var(--cream);display:flex;flex-direction:column;align-items:center;justify-content:center;
         padding:0 8cqw}
  .iam{font:500 italic 4.6cqw 'Fraunces',serif;color:#b8863a}
  .name{font:600 11.5cqw 'Fraunces',serif;line-height:.98;color:var(--teal-dk);text-align:center;margin-top:.4cqw}
  .name-ar{font:600 5cqw 'Baloo Bhaijaan 2',sans-serif;color:#b8863a;margin-top:1cqw}
  .fitname{white-space:nowrap;width:100%;text-align:center}
  /* fine gold keyline frame over the photo (no stars) */
  .keyline{position:absolute;inset:5%;border:1px solid rgba(246,234,210,.7);border-radius:3px;pointer-events:none;z-index:2}
  .keyline::after{content:"";position:absolute;inset:1cqw;border:1px solid rgba(246,234,210,.4);border-radius:2px}

  /* BACK */
  .back .inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
               padding:12cqw 11cqw;padding-left:calc(11cqw + var(--bleed))}

  /* SPINE */
  .spine .txt{writing-mode:vertical-rl;transform:rotate(180deg);white-space:nowrap;display:flex;align-items:center;gap:18px;
              font:600 9px 'Plus Jakarta Sans';letter-spacing:.18em;text-transform:uppercase;color:#fbf2dd}
</style>
</head>
<body>
  <div class="cap">Wraparound cover &nbsp;·&nbsp; back + spine + front &nbsp;·&nbsp; one Lulu cover file</div>
  <div class="wrap">

    <!-- ===== BACK COVER (left) ===== -->
    <div class="panel back">
      <div class="inner">
        <div style="font:400 4cqw 'Fraunces',serif;color:#fbf2dd;line-height:1.45">Twelve gentle reminders of the good character Allah placed in every child.</div>
        <div style="font:400 2.7cqw 'Fraunces',serif;font-style:italic;color:#bcd0c9;line-height:1.5;margin-top:4cqw">In English and Arabic, starring your child.</div>
        <img src="{{LOGO}}" alt="Ketabi Studio" style="width:26%;margin-top:9cqw;opacity:.95">
      </div>
      <div class="fold" style="right:0"></div>
    </div>

    <!-- ===== SPINE ===== -->
    <div class="panel spine">
      <div class="txt"><span>I am {{CHILD_NAME}}</span><span style="color:#e6b94e">Ketabi</span></div>
    </div>

    <!-- ===== FRONT COVER (right) ===== -->
    <div class="panel front">
      <div class="fold" style="left:0"></div>
      <div class="coverface">
        <div class="photo-area">
          <img class="coverphoto" src="{{PHOTO_COVER}}" style="{{PHOTO_COVER_STYLE}}" alt="">
        </div>
        <div class="plate">
          <div class="iam">I am</div>
          <div class="fitname name">{{CHILD_NAME}}</div>
          <div class="name-ar">{{CHILD_NAME_ARABIC}}</div>
        </div>
      </div>
    </div>

  </div>
<script>
function _fitName(el){if(el.dataset.fitBase){el.style.fontSize=el.dataset.fitBase;}else{el.dataset.fitBase=getComputedStyle(el).fontSize;}var g=0;while(el.scrollWidth>el.clientWidth+0.5&&g<40){var s=parseFloat(getComputedStyle(el).fontSize);if(s<=6)break;el.style.fontSize=(s*0.95)+'px';g++;}}
function _fitNames(){document.querySelectorAll('.fitname').forEach(_fitName);}
window.__fitNames=_fitNames;
(document.fonts&&document.fonts.ready?document.fonts.ready:Promise.resolve()).then(_fitNames);
</script>
</body>
</html>
