services:
  - type: worker
    name: ketabi-order-worker
    runtime: docker
    dockerfilePath: ./worker/Dockerfile
    dockerContext: .
    plan: standard   # 2 GB RAM — book/hardcover render needs the headroom (Starter 512MB OOM'd)
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: LULU_CLIENT_KEY
        sync: false
      - key: LULU_CLIENT_SECRET
        sync: false
      - key: LULU_ENV
        value: sandbox
      - key: POLL_SECONDS
        value: "30"
      - key: PRODIGI_API_KEY
        sync: false
      - key: PRODIGI_ENV
        value: sandbox
      - key: SITE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ADMIN_EMAIL
        sync: false
