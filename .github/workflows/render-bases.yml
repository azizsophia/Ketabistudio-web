name: Render Art Bases

on:
  workflow_dispatch:
    inputs:
      pages:
        description: 'Range: 1-3, 4-6, 7-9, 10-11, 12-25, or cover'
        required: true
        default: '1-3'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
                run: pip install -r worker/requirements.txt gdown


      - name: Download Modesty PSD pack
        run: |
          gdown 1lexhpYL8Gq_2kbvYDeBP80uTXpHcX12K -O /tmp/Modesty.zip
          ls -lh /tmp/Modesty.zip

      - name: Extract PSDs
        run: |
          mkdir -p /tmp/modesty
          unzip -q /tmp/Modesty.zip -d /tmp/modesty
          rm /tmp/Modesty.zip
          COVER=$(find /tmp/modesty -name "Cover.psd" | head -1)
          echo "MODESTY_DIR=$(dirname "$COVER")" >> $GITHUB_ENV
          df -h / | tail -1

      - name: Render and upload bases
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python worker/render_bases_ci.py "${{ github.event.inputs.pages }}"
