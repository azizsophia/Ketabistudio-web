name: Social poster
# Reliable trigger for the daily auto-poster. Vercel's free-tier cron fires
# late/unreliably, so this pings the poster endpoint at the four slot times
# (10:00, 13:00, 19:00, 22:00 UTC) plus a catch-up hour after each. The
# endpoint only publishes posts whose scheduled_for is already due and marks
# them published, so extra/overlapping runs never double-post.
on:
  schedule:
    - cron: '0 10 * * *'   # morning slot
    - cron: '5 11 * * *'   # catch-up
    - cron: '0 13 * * *'   # midday slot
    - cron: '5 14 * * *'   # catch-up
    - cron: '0 19 * * *'   # afternoon slot
    - cron: '5 20 * * *'   # catch-up
    - cron: '0 22 * * *'   # evening slot
    - cron: '5 23 * * *'   # catch-up
  workflow_dispatch: {}     # lets you (or me) trigger it by hand anytime
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger poster
        run: |
          code=$(curl -s -o /tmp/out.json -w "%{http_code}" --max-time 280 \
            "https://www.ketabistudio.com/api/cron/social" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "HTTP $code"; cat /tmp/out.json; echo
          test "$code" = "200"
