name: Deploy to Vercel on push to main

# The sandbox that authors these commits mirrors them to GitHub in a way that
# does not always fire Vercel's build webhook, so pushes can land on main without
# deploying. This workflow closes that gap: on every push to main it pings a
# Vercel Deploy Hook, which builds the latest main commit.
#
# One-time setup (see instructions from the assistant):
#   1. Vercel > Project > Settings > Git > Deploy Hooks > create one for `main`.
#   2. Copy the URL.
#   3. GitHub repo > Settings > Secrets and variables > Actions > New secret
#      named VERCEL_DEPLOY_HOOK, paste the URL.
# After that, every push to main deploys automatically.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK secret not set; skipping. Add it to enable auto-deploy."
            exit 0
          fi
          code=$(curl -s -o /tmp/hook.json -w "%{http_code}" -X POST "$HOOK")
          echo "HTTP $code"; cat /tmp/hook.json; echo
          test "$code" = "200" -o "$code" = "201"
