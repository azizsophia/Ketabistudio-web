name: Inspect Archive Audio

on:
  workflow_dispatch:
    inputs:
      item:
        description: "archive.org item id"
        default: "HisnulMuslimAudio_201510"

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Fetch metadata
        env:
          ITEM: ${{ inputs.item }}
        run: |
          pip install requests >/dev/null 2>&1
          python - <<'PY'
          import os, requests
          item = os.environ.get("ITEM", "HisnulMuslimAudio_201510")
          m = requests.get(f"https://archive.org/metadata/{item}", timeout=60).json()
          md = m.get("metadata", {})
          print("=== ITEM:", item)
          for k in ("title","creator","licenseurl","license","rights","possible-copyright-status","collection"):
              print(f"{k}: {md.get(k)}")
          print("=== AUDIO FILES ===")
          for f in m.get("files", []):
              if f.get("name","").lower().endswith((".mp3",".ogg")):
                  print(f"{f.get('name')} | title={f.get('title')} | track={f.get('track')}")
          PY
