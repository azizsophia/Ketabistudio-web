name: QC Duas Book

# Verify all 9 "My Beautiful Duas" combos (character x look) render correctly:
# 32 pages, 8.5in square, cover present, no blank pages, long-name cover fit.
# Pushes a PASS/FAIL report + contact sheets to the 'duas-qc-results' branch.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  qc:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Deps
        run: pip install pillow requests arabic-reshaper python-bidi pypdf
      - name: Run Duas QC
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python worker/qc_duas.py
      - name: Push results
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add duas_qc
          git commit -m "Duas QC results" || { echo nothing; exit 0; }
          git push origin HEAD:duas-qc-results --force
